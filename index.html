<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Best Technologie</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

.section-title {
  text-align:center;
  margin-top:30px;
  color:#38bdf8;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#111827;
  border-radius:10px;
  padding:10px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
  border-radius:10px;
}

.price {
  color:#22c55e;
}

.btn {
  display:block;
  text-align:center;
  padding:10px;
  background:#25D366;
  color:white;
  text-decoration:none;
  border-radius:5px;
}
</style>
</head>

<body>

<h1 style="text-align:center;">Best Technologie ⚡</h1>

<!-- WATCH -->
<h2 class="section-title">Smart Watch ⌚</h2>
<div class="products">

<div class="card">
<img src="watch.png">
<h3>Smart Watch Ultra</h3>
<p class="price">800 DH</p>
<a class="btn" target="_blank"
href="https://wa.me/212706825831?text=I%20want%20Smart%20Watch">
Buy on WhatsApp
</a>
</div>

</div>

<!-- HEADPHONES -->
<h2 class="section-title">Headphones 🎧</h2>
<div class="products">

<div class="card">
<img src="headphone.png">
<h3>Wireless Bluetooth Headphones</h3>
<p class="price">300 DH</p>
<a class="btn" target="_blank"
href="https://wa.me/212706825831?text=I%20want%20Headphones">
Buy on WhatsApp
</a>
</div>

</div>

<!-- LAPTOP -->
<h2 class="section-title">Laptops 💻</h2>
<div class="products">

<div class="card">
<img src="laptop.png">
<h3>Lenovo Laptop i5</h3>
<p class="price">5500 DH</p>
<a class="btn" target="_blank"
href="https://wa.me/212706825831?text=I%20want%20Lenovo%20Laptop">
Buy on WhatsApp
</a>
</div>

</div>

</body>
</html>
