<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Electronique Badr</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    nav {
      background: #222;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
    }

    .hero h2 {
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #28a745;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 15px;
      width: 220px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: green;
      font-weight: bold;
      margin: 10px 0;
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 30px;
    }
  </style>

</head>
<body>

<header>
  <h1>Electronique Badr ⚡</h1>
  <p>Your electronics store</p>
</header>

<nav>
  <a href="#home">Home</a>
  <a href="#products">Products</a>
</nav>

<!-- HERO -->
<div id="home" class="hero">
  <h2>Welcome to Electronique Badr</h2>
  <p>Best electronic products at affordable prices</p>
  <a href="#products" class="btn">Shop Now</a>
</div>

<!-- PRODUCTS -->
<div id="products" class="section">
  <h2>Our Products</h2>

  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1518441902117-f0a4d5d5c5a5" alt="">
      <h3>Casque Bluetooth</h3>
      <p class="price">150 DH</p>
      <a href="#" class="btn">Buy Now</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1580894894513-541e068a3e2a" alt="">
      <h3>Écoute Bluetooth</h3>
      <p class="price">120 DH</p>
      <a href="#" class="btn">Buy Now</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b" alt="">
      <h3>Smart Watch</h3>
      <p class="price">300 DH</p>
      <a href="#" class="btn">Buy Now</a>
    </div>

  </div>
</div>

<footer>
  <p>© 2026 Electronique Badr</p>
</footer>

</body>
</html>
