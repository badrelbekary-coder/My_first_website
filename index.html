<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Tech Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:#fff;
}

nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#11182a;
}

.logo{color:#00d4ff;font-size:20px;font-weight:bold;}

button{
  cursor:pointer;
}

/* Tabs */
.tabs{
  display:flex;
  justify-content:center;
  margin:15px;
}

.tabs button{
  margin:5px;
  padding:10px;
  border:none;
  background:#00d4ff;
  border-radius:5px;
}

/* Sections */
.section{
  display:none;
  padding:20px;
}

.active{
  display:block;
}

/* Products */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:#11182a;
  padding:15px;
  border-radius:10px;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

/* Cart */
.cart{
  position:fixed;
  right:10px;
  top:70px;
  width:300px;
  background:#11182a;
  padding:10px;
  border-radius:10px;
  display:none;
}

.remove{
  color:red;
  cursor:pointer;
}

/* Login */
.login-box{
  max-width:300px;
  margin:auto;
  background:#11182a;
  padding:20px;
  border-radius:10px;
}

input{
  width:100%;
  margin:5px 0;
  padding:8px;
  border:none;
  border-radius:5px;
}

</style>
</head>

<body>

<nav>
  <div class="logo">Ultimate Store</div>
  <div>
    <button onclick="toggleCart()">Cart</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="tabs">
  <button onclick="showSection('shop')">Shop</button>
  <button onclick="showSection('admin')">Admin</button>
  <button onclick="showSection('login')">Login</button>
</div>

<!-- LOGIN -->
<div id="login" class="section active">
  <div class="login-box">
    <h3>Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- SHOP -->
<div id="shop" class="section">
  <div class="products" id="products"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
  <h3>Add Product</h3>
  <input id="pname" placeholder="Name">
  <input id="pprice" placeholder="Price">
  <input id="pimg" placeholder="Image URL">
  <button onclick="addProduct()">Add</button>

  <h3>Product List</h3>
  <div id="adminList"></div>
</div>

<!-- CART -->
<div class="cart" id="cart">
  <h3>Cart</h3>
  <div id="cartItems"></div>
  <div id="total"></div>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let loggedIn = false;

/* INIT DEFAULT PRODUCTS */
if(products.length === 0){
  products = [
    {name:"Watch", price:200, img:"https://via.placeholder.com/300"},
    {name:"Headphones", price:150, img:"https://via.placeholder.com/300"}
  ];
  localStorage.setItem("products", JSON.stringify(products));
}

/* LOGIN */
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u==="admin" && p==="1234"){
    loggedIn = true;
    alert("Login success");
    showSection("shop");
  }else{
    alert("Wrong credentials");
  }
}

function logout(){
  loggedIn = false;
  alert("Logged out");
}

/* SECTIONS */
function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id==="shop") displayProducts();
  if(id==="admin") displayAdmin();
}

/* PRODUCTS */
function displayProducts(){
  const div = document.getElementById("products");
  div.innerHTML = "";

  products.forEach((p,i)=>{
    div.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>$${p.price}</p>
        <button onclick="addToCart(${i})">Add</button>
      </div>
    `;
  });
}

/* ADMIN */
function addProduct(){
  if(!loggedIn){
    alert("Login required");
    return;
  }

  const name = document.getElementById("pname").value;
  const price = document.getElementById("pprice").value;
  const img = document.getElementById("pimg").value;

  products.push({name, price, img});
  localStorage.setItem("products", JSON.stringify(products));

  displayProducts();
  displayAdmin();
}

function displayAdmin(){
  const div = document.getElementById("adminList");
  div.innerHTML = "";

  products.forEach((p,i)=>{
    div.innerHTML += `
      <div>
        ${p.name} - $${p.price}
        <button onclick="deleteProduct(${i})">Delete</button>
      </div>
    `;
  });
}

function deleteProduct(i){
  products.splice(i,1);
  localStorage.setItem("products", JSON.stringify(products));
  displayAdmin();
  displayProducts();
}

/* CART */
function addToCart(i){
  cart.push(products[i]);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function updateCart(){
  const div = document.getElementById("cartItems");
  const totalEl = document.getElementById("total");

  div.innerHTML = "";
  let total = 0;

  cart.forEach((item,i)=>{
    total += Number(item.price);

    div.innerHTML += `
      <div>
        ${item.name} - $${item.price}
        <span class="remove" onclick="removeItem(${i})">X</span>
      </div>
    `;
  });

  totalEl.innerText = "Total: $" + total;
}

function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function toggleCart(){
  const c = document.getElementById("cart");
  c.style.display = c.style.display === "block" ? "none" : "block";
}

/* INIT */
displayProducts();
updateCart();
</script>

</body>
</html>
