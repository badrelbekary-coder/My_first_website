<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Best Technologie</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

.navbar {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#0f172a;
}

.section-title {
  text-align:center;
  margin-top:30px;
  color:#38bdf8;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:#111827;
  border-radius:10px;
  padding:10px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
  border-radius:10px;
}

.price {
  color:#22c55e;
}

.btn {
  display:block;
  text-align:center;
  padding:10px;
  background:#25D366;
  color:white;
  text-decoration:none;
  border-radius:5px;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>Best Technologie</h2>
</div>

<!-- SMART WATCH -->
<h2 class="section-title">Smart Watches ⌚</h2>
<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b">
<h3>Amazfit Smart Watch</h3>
<p class="price">650 DH</p>
<a class="btn" href="https://wa.me/212706825831?text=I%20want%20Amazfit%20Watch">Buy</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<h3>Huawei Watch Fit</h3>
<p class="price">900 DH</p>
<a class="btn" href="https://wa.me/212706825831?text=I%20want%20Huawei%20Watch">Buy</a>
</div>

</div>

<!-- LAPTOPS -->
<h2 class="section-title">Laptops 💻</h2>
<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<h3>HP Laptop i5</h3>
<p class="price">5200 DH</p>
<a class="btn" href="https://wa.me/212706825831?text=I%20want%20HP%20Laptop">Buy</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853">
<h3>Dell Inspiron 15</h3>
<p class="price">6000 DH</p>
<a class="btn" href="https://wa.me/212706825831?text=I%20want%20Dell%20Laptop">Buy</a>
</div>

</div>

<!-- HEADPHONES -->
<h2 class="section-title">Bluetooth Headphones 🎧</h2>
<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1518444065439-e933c06ce9cd">
<h3>JBL Bluetooth Headphones</h3>
<p class="price">350 DH</p>
<a class="btn" href="https://wa.me/212706825831?text=I%20want%20JBL%20Headphones">Buy</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a41552262d92">
<h3>AirPods Pro Copy</h3>
<p class="price">250 DH</p>
<a class="btn" href="https://wa.me/212706825831?text=I%20want%20AirPods">Buy</a>
</div>

</div>

</body>
</html>
