<!DOCTYPE html>

<title>Best Technologie</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0f1f;
  color: white;
}

header {
  text-align: center;
  padding: 50px 20px;
  background: linear-gradient(90deg, #2563eb, #22c55e);
}

header h1 {
  font-size: 45px;
  margin: 0;
}

header p {
  margin-top: 10px;
  font-size: 18px;
  color: #e5e7eb;
}

.section {
  padding: 40px 20px;
}

.section h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #38bdf8;
}

.products {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: #111827;
  border-radius: 15px;
  width: 260px;
  padding: 15px;
  text-align: center;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

.price {
  color: #22c55e;
  margin: 10px 0;
  font-size: 18px;
}

.btn {
  display: inline-block;
  padding: 10px 16px;
  background: #25D366;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
}

.btn:hover {
  background: #1ebe5d;
}
</style>

</head>
