<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Best Technologie</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #0f172a;
  position: sticky;
  top: 0;
}

.navbar input {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

/* Cart */
.cart {
  background: #22c55e;
  padding: 6px 10px;
  border-radius: 5px;
  cursor: pointer;
}

/* Header */
header {
  text-align: center;
  padding: 50px;
  background: linear-gradient(90deg,#111,#1e293b);
}

/* Products */
.products {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
  padding: 20px;
}

.card {
  background: #111827;
  width: 220px;
  padding: 10px;
  border-radius: 10px;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
}

img {
  width: 100%;
  border-radius: 8px;
}

.price {
  color: #22c55e;
}

/* Button */
button {
  background: #22c55e;
  border: none;
  padding: 8px;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#111827;
  padding:20px;
  border-radius:10px;
  width:300px;
}

.close {
  float:right;
  cursor:pointer;
  color:red;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>Best Technologie</h2>
  <input type="text" id="search" placeholder="Search...">
  <div class="cart" onclick="showCart()">Cart 🛒 (<span id="cartCount">0</span>)</div>
</div>

<header>
  <h1>Electronic Store ⚡</h1>
</header>

<div class="products" id="products">

  <div class="card" onclick="openModal('iPhone 13','9000 DH','https://images.unsplash.com/photo-1511707171634-5f897ff02aa9')">
    <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
    <h3>iPhone 13</h3>
    <p class="price">9000 DH</p>
    <button onclick="addToCart(event,'iPhone 13','9000 DH')">Add</button>
  </div>

  <div class="card" onclick="openModal('Samsung S22','7500 DH','https://images.unsplash.com/photo-1598327105666-5b89351aff97')">
    <img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97">
    <h3>Samsung S22</h3>
    <p class="price">7500 DH</p>
    <button onclick="addToCart(event,'Samsung S22','7500 DH')">Add</button>
  </div>

</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">X</span>
    <img id="modalImg" width="100%">
    <h2 id="modalTitle"></h2>
    <p id="modalPrice"></p>
  </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* Update cart count */
function updateCart(){
  document.getElementById("cartCount").innerText = cart.length;
}
updateCart();

/* Add to cart */
function addToCart(e,name,price){
  e.stopPropagation();
  cart.push({name,price});
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

/* Modal */
function openModal(title,price,img){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalTitle").innerText=title;
  document.getElementById("modalPrice").innerText=price;
  document.getElementById("modalImg").src=img;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* Cart alert */
function showCart(){
  alert("Items in cart: " + cart.length);
}

/* Search */
document.getElementById("search").addEventListener("keyup",function(){
  let value=this.value.toLowerCase();
  let cards=document.querySelectorAll(".card");

  cards.forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(value) ? "block" : "none";
  });
});
</script>

</body>
</html>
