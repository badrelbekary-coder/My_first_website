<!DOCTYPE html>
<html lang="en">
<head>

  <title>Electronique Badr</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #111, #1e293b);
    }

    header h1 {
      margin: 0;
      font-size: 40px;
      letter-spacing: 2px;
    }

    header p {
      color: #38bdf8;
      margin-top: 10px;
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
    }

    .hero h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #94a3b8;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      width: 240px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: #22c55e;
      font-weight: bold;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 10px;
    }
