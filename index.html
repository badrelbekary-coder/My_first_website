<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Electronique Badr</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      background: linear-gradient(90deg, #0ea5e9, #22c55e);
    }

    header h1 {
      margin: 0;
      font-size: 40px;
    }

    header p {
      margin-top: 10px;
      font-size: 18px;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 30px;
    }

    .card {
      background: #1e293b;
      border-radius: 15px;
      width: 280px;
      margin: 15px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    .price {
      color: #22c55e;
      font-size: 20px;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 10px;
      font-weight: bold;
    }

    .btn:hover {
      background: #1ebe5d;
    }
  </style>
</head>

<body>

<header>
  <h1>Electronique Badr ⚡</h1>
  <p>Best Electronic Products</p>
</header>

<div class="container">

  <!-- Product 1 -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1518441902117-f0a2a1a2d0e2" alt="">
    <h2>Casque Bluetooth</h2>
    <p class="price">250 DH</p>
    <a class="btn" 
       href="https://wa.me/212706825831?text=Bonjour%20je%20veux%20acheter%20Casque%20Bluetooth">
       Buy on WhatsApp
    </a>
  </div>

  <!-- Product 2 -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1518441902117-f0a2a1a2d0e2" alt="">
    <h2>Écoute Bluetooth</h2>
    <p class="price">150 DH</p>
    <a class="btn" 
       href="https://wa.me/212706825831?text=Bonjour%20je%20veux%20acheter%20Ecoute%20Bluetooth">
       Buy on WhatsApp
    </a>
  </div>

  <!-- Product 3 -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" alt="">
    <h2>Smart Watch</h2>
    <p class="price">300 DH</p>
    <a class="btn" 
       href="https://wa.me/212706825831?text=Bonjour%20je%20veux%20acheter%20Smart%20Watch">
       Buy on WhatsApp
    </a>
  </div>

</div>

</body>
</html>
